<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    nav {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: #ffffff;
      background: #2563eb;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
    }

    nav a:hover {
      background: #1d4ed8;
    }

    h1 {
      margin-top: 0;
      color: #111827;
    }

    .contact-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .contact-list li {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="apropos.html">À propos</a>
      <a href="contact.html">Contact</a>
    </nav>

    <h1>Contact</h1>
    <p>Voici quelques informations de contact :</p>
    <ul class="contact-list">
      <li>Email : contact@monsite.com</li>
      <li>Téléphone : +33 6 12 34 56 78</li>
      <li>Adresse : 123 Rue Exemple, Paris</li>
    </ul>

    <form action="/submit" method="post">
      <label for="name">Nom:</label>
      <input type="text" id="name" name="name" required>
      <br>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <br>
      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>
      <br>
      <input type="submit" value="Envoyer">
    </form>
  </div>
</body>
</html>
